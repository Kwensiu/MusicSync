name: music_sync
description: LAN music folder mirror sync tool for Windows and Android.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_selector: ^1.0.3
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.0
  intl: ^0.20.2
  path: ^1.9.1
  qr_flutter: ^4.1.0
  shared_preferences: ^2.5.3
  dart_tags: ^0.4.1
  basic_utils: ^5.8.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

name: Build Installers

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.41.6

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_full: ${{ steps.version.outputs.version_full }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from pubspec
        id: version
        run: |
          VERSION_LINE=$(sed -n 's/^version: //p' pubspec.yaml)
          VERSION_NAME=${VERSION_LINE%%+*}
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_full=$VERSION_LINE" >> "$GITHUB_OUTPUT"

  verify:
    runs-on: ubuntu-latest
    env:
      PUB_CACHE: ~/.pub-cache
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Restore packages
        run: flutter pub get --enforce-lockfile

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build_android:
    needs:
      - metadata
      - verify
    runs-on: ubuntu-latest
    env:
      PUB_CACHE: ~/.pub-cache
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Android signing secrets are configured
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || (echo "Missing secret: ANDROID_KEYSTORE_BASE64" && exit 1)
          test -n "$ANDROID_KEYSTORE_PASSWORD" || (echo "Missing secret: ANDROID_KEYSTORE_PASSWORD" && exit 1)
          test -n "$ANDROID_KEY_ALIAS" || (echo "Missing secret: ANDROID_KEY_ALIAS" && exit 1)
          test -n "$ANDROID_KEY_PASSWORD" || (echo "Missing secret: ANDROID_KEY_PASSWORD" && exit 1)

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Restore packages
        run: flutter pub get --enforce-lockfile

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks

      - name: Generate key.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat <<EOF > android/key.properties
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=../upload-keystore.jks
          EOF

      - name: Build Android APKs
        run: flutter build apk --release --split-per-abi

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Upload Android APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MusicSync-${{ needs.metadata.outputs.version_full }}-android-apk-split-abi
          path: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 14
          if-no-files-found: error

      - name: Upload Android app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicSync-${{ needs.metadata.outputs.version_full }}-android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 14
          if-no-files-found: error

  build_windows:
    needs:
      - metadata
      - verify
    runs-on: windows-latest
    env:
      PUB_CACHE: ~\AppData\Local\Pub\Cache
    steps:
      - uses: actions/checkout@v4

      - name: Enable long paths
        run: git config --system core.longpaths true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Restore packages
        run: flutter pub get --enforce-lockfile

      - name: Build Windows bundle
        run: flutter build windows --release

      - name: Archive Windows bundle
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/windows/x64/runner/MusicSync-${{ needs.metadata.outputs.version_full }}-windows-x64.zip

      - name: Build Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: scripts/windows/installer.iss
          options: /DMyAppVersion=${{ needs.metadata.outputs.version_name }} /O+

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicSync-${{ needs.metadata.outputs.version_full }}-windows-bundle
          path: build/windows/x64/runner/MusicSync-${{ needs.metadata.outputs.version_full }}-windows-x64.zip
          retention-days: 14
          if-no-files-found: error

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicSync-${{ needs.metadata.outputs.version_full }}-windows-installer
          path: windows/inno-output/MusicSync-${{ needs.metadata.outputs.version_name }}-windows-x64-setup.exe
          retention-days: 14
          if-no-files-found: error
